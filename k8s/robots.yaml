# PA2 C3 or C4: Five robots. Set INVENTORY_HOST to C2 master IP so they reach inventory via NodePort.
# Example for C2 master 172.16.2.136: set env INVENTORY_HOST=172.16.2.136, INVENTORY_GRPC_PORT=30651, INVENTORY_ZMQ_PORT=30656 (team9 NodePorts)
# Replace REGISTRY and team name; apply on cluster where robots run (e.g. C3).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robot-bread
  namespace: team9
  labels:
    app: robot
    aisle: bread
spec:
  replicas: 1
  selector:
    matchLabels:
      app: robot-bread
  template:
    metadata:
      labels:
        app: robot-bread
        aisle: bread
    spec:
      containers:
        - name: robot
          image: 192.168.1.129:5000/team9/robot-service:latest
          imagePullPolicy: Always
          args: ["--aisle", "bread"]
          env:
            - name: INVENTORY_HOST
              value: "172.16.2.136"
            - name: INVENTORY_GRPC_PORT
              value: "30651"
            - name: INVENTORY_ZMQ_PORT
              value: "30656"
