# PA2 C2: Inventory service. NodePort so ordering (C2) and robots (C3/C4) can reach it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: team10
  labels:
    app: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory
          image: 192.168.1.129:5000/team10/inventory-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 5556
              name: zmq
          env:
            - name: PRICING_HOST
              value: "pricing-service"
            - name: PRICING_GRPC_PORT
              value: "50052"
            - name: INVENTORY_GRPC_PORT
              value: "50051"
            - name: INVENTORY_ZMQ_BIND
              value: "tcp://*:5556"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: team10
spec:
  type: NodePort
  selector:
    app: inventory-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      nodePort: 30651
    - name: zmq
      port: 5556
      targetPort: 5556
      nodePort: 30656
