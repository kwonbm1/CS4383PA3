# PA2 C2: Analytics service. Subscribes to ordering ZMQ (same cluster: ordering-service:5557).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: team10
  labels:
    app: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics
          image: 192.168.1.129:5000/team10/analytics-service:latest
          imagePullPolicy: Always
          env:
            - name: ORDERING_HOST
              value: "ordering-service"
            - name: ORDERING_ZMQ_PORT
              value: "5557"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
---
# No NodePort needed: analytics is subscriber-only, not called from other clusters.
