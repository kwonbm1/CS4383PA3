# PA2 C2: Pricing service. NodePort for cross-cluster if needed (inventory is on same cluster, uses ClusterIP).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-service
  namespace: team10
  labels:
    app: pricing-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pricing-service
  template:
    metadata:
      labels:
        app: pricing-service
    spec:
      containers:
        - name: pricing
          image: 192.168.1.129:5000/team10/pricing-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50052
              name: grpc
          env:
            - name: PRICING_GRPC_PORT
              value: "50052"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: pricing-service
  namespace: team10
spec:
  type: NodePort
  selector:
    app: pricing-service
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
      nodePort: 30652
