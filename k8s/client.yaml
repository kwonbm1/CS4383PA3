# PA2 C1 (or team VM): Streamlit client. Points to Ordering on C2 via NodePort.
# Set ORDERING_HOST to C2 master IP (172.16.2.136) and ORDERING_HTTP_PORT=30601 (team9 NodePort).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: team9
  labels:
    app: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: 192.168.1.129:5000/team9/client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
              name: http
          env:
            - name: ORDERING_HOST
              value: "172.16.2.136"
            - name: ORDERING_HTTP_PORT
              value: "30601"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: team9
spec:
  type: NodePort
  selector:
    app: client
  ports:
    - name: http
      port: 8501
      targetPort: 8501
      nodePort: 30602
